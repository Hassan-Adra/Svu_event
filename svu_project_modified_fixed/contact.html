
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .contact-container{
max-width:700px;
margin:60px auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.12);
}

.contact-container h2{
text-align:center;
margin-bottom:30px;
color:#1e3a8a;
font-size:32px;
}

.contact-form{
display:flex;
flex-direction:column;
gap:18px;
}

.contact-form label{
font-weight:bold;
color:#333;
margin-bottom:6px;
display:block;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:14px;
border:1px solid #cbd5e1;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
transition:0.3s;
}

.contact-form input:focus,
.contact-form textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 4px rgba(37,99,235,0.15);
}

.contact-form textarea{
height:160px;
resize:vertical;
}

.contact-form button{
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
border:none;
padding:14px;
font-size:17px;
font-weight:bold;
border-radius:14px;
cursor:pointer;
transition:0.3s;
}

.contact-form button:hover{
transform:translateY(-2px);
opacity:0.92;
}

</style>


<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
}

.top-navbar{
display:flex;
justify-content:center;
gap:15px;
padding:18px;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
border-radius:0 0 18px 18px;
box-shadow:0 6px 18px rgba(0,0,0,0.18);
flex-wrap:wrap;
}

.top-navbar a{
text-decoration:none;
color:white;
padding:12px 22px;
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.2);
border-radius:14px;
font-weight:bold;
transition:0.3s ease;
backdrop-filter:blur(6px);
}

.top-navbar a:hover{
background:white;
color:#1e3a8a;
transform:translateY(-2px) scale(1.03);
}

.hero-image{
width:100%;
height:420px;
object-fit:cover;
border-radius:20px;
margin:20px 0;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>
<body>
<div class="top-navbar">
<a href="index.html">الرئيسية</a>
<a href="events.html">الفعاليات</a>
<a href="about.html">عن الموقع</a>
<a href="contact.html">اتصل بنا</a>
</div>
<br>

<main>
    <section class="contact-section">
        <h2>تواصل معنا</h2>
        <form action="#" method="post" class="contact-form">
            <label for="fullName">الاسم الكامل</label>
            <input type="text" id="fullName" name="fullName" placeholder="أدخل اسمك الكامل" required>

            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>

            <label for="phone">الهاتف</label>
            <input type="tel" id="phone" name="phone" placeholder="أدخل رقم هاتفك">

            <label for="message">الرسالة</label>
            <textarea id="message" name="message" placeholder="اكتب رسالتك هنا" required></textarea>

            <button type="submit">إرسال</button>
        </form>
    </section>
</main>

</body>
</html>
